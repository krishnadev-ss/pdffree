app = "pdffree-api"
primary_region = "iad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  # Populated via fly secrets or Terraform
  # PORT = "8080"
  # ALLOWED_ORIGINS = ""
  # R2_ENDPOINT = ""
  # R2_BUCKET = ""
  # REDIS_URL = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
